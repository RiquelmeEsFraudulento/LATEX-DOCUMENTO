name: Compilar LaTeX a PDF

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar fuentes adicionales
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-lmodern fonts-dejavu-core

      - name: Primera compilación (generar .aux)
        uses: xu-cheng/latex-action@4.1.0
        continue-on-error: true
        with:
          root_file: document.tex
          latexmk_use_lualatex: true

      - name: Segunda compilación (referencias cruzadas)
        uses: xu-cheng/latex-action@4.1.0
        continue-on-error: true
        with:
          root_file: document.tex
          latexmk_use_lualatex: true

      - name: Tercera compilación (estabilizar tabularray)
        uses: xu-cheng/latex-action@4.1.0
        with:
          root_file: document.tex
          latexmk_use_lualatex: true
          args: "-f"

      - name: Subir PDF como artifact
        uses: actions/upload-artifact@v4
        with:
          name: documento-pdf
          path: "*.pdf"